definitions:
  codes.ErrorCode:
    enum:
    - 0
    - 1001
    - 1002
    - 1003
    - 1004
    - 1005
    - 1006
    - 2001
    - 2002
    - 3001
    - 6666
    format: int32
    type: integer
    x-enum-varnames:
    - UnknownErrCode
    - UnauthorizedErrCode
    - InternalErrCode
    - NotFoundErrCode
    - NoAccessErrCode
    - InvalidRequestErrCode
    - InvalidRequestParametersErrCode
    - FriendNotFoundErrCode
    - CantSendRequestToYourselfErrCode
    - WishNotFoundErrCode
    - TestErrCode
  service.CreateWishlistItemRequest:
    properties:
      description:
        type: string
      links:
        items:
          $ref: '#/definitions/service.WishlistItemLink'
        type: array
      price:
        type: string
      reservable:
        type: boolean
      title:
        type: string
      wishlist_id:
        type: integer
    type: object
  service.CreateWishlistRequest:
    properties:
      description:
        type: string
      is_private:
        type: boolean
      title:
        type: string
      users_with_access:
        items:
          type: integer
        type: array
    type: object
  service.Friend:
    properties:
      id:
        type: integer
      name:
        type: string
      photo_url:
        type: string
      username:
        type: string
    type: object
  service.FriendWishlist:
    properties:
      description:
        type: string
      id:
        type: integer
      title:
        type: string
    type: object
  service.FriendWishlistItem:
    properties:
      description:
        type: string
      id:
        type: integer
      links:
        items:
          $ref: '#/definitions/service.WishlistItemLink'
        type: array
      price:
        type: string
      reservable:
        type: boolean
      reservation_can_be_canceled:
        type: boolean
      reserved:
        type: boolean
      title:
        type: string
      wishlist_id:
        type: integer
    type: object
  service.IncomingFriendsRequestsCountResponse:
    properties:
      count:
        type: integer
    type: object
  service.UpdateUser:
    properties:
      displayed_name:
        type: string
      open_to_requests:
        type: boolean
      photo_url:
        type: string
    type: object
  service.User:
    properties:
      displayed_name:
        type: string
      open_to_requests:
        type: boolean
      photo_url:
        type: string
    type: object
  service.UserSettings:
    properties:
      displayed_name:
        type: string
      open_to_requests:
        type: boolean
    type: object
  service.Wishlist:
    properties:
      description:
        type: string
      id:
        type: integer
      is_private:
        type: boolean
      share_uuid:
        type: string
      title:
        type: string
    type: object
  service.WishlistItem:
    properties:
      description:
        type: string
      id:
        type: integer
      links:
        items:
          $ref: '#/definitions/service.WishlistItemLink'
        type: array
      price:
        type: string
      reservable:
        type: boolean
      title:
        type: string
      wishlist_id:
        type: integer
    type: object
  service.WishlistItemLink:
    properties:
      title:
        type: string
      url:
        type: string
    type: object
  subcodeErrors.Response:
    properties:
      request_uuid:
        type: string
      subcode:
        $ref: '#/definitions/codes.ErrorCode'
    type: object
