basePath: /api
definitions:
  service.CreateWishlistItemRequest:
    properties:
      description:
        type: string
      links:
        items:
          $ref: '#/definitions/service.WishlistItemLink'
        type: array
      price:
        type: string
      reservable:
        type: boolean
      title:
        type: string
    type: object
  service.CreateWishlistRequest:
    properties:
      description:
        type: string
      is_private:
        type: boolean
      title:
        type: string
    type: object
  service.Friend:
    properties:
      id:
        type: integer
      photo_url:
        type: string
      username:
        type: string
    type: object
  service.Wishlist:
    properties:
      description:
        type: string
      id:
        type: integer
      is_private:
        type: boolean
      title:
        type: string
    type: object
  service.WishlistItem:
    properties:
      description:
        type: string
      id:
        type: integer
      links:
        items:
          $ref: '#/definitions/service.WishlistItemLink'
        type: array
      price:
        type: string
      reservable:
        type: boolean
      reserved_by:
        type: integer
      title:
        type: string
      wishlist_id:
        type: integer
    type: object
  service.WishlistItemLink:
    properties:
      title:
        type: string
      url:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server celler server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Swagger Example API
  version: "1.0"
paths:
  /user/friends:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/service.Friend'
            type: array
      summary: returns user's friends list
      tags:
      - friends
  /user/friends/requests/{friend_id}:
    post:
      consumes:
      - application/json
      parameters:
      - description: Friend ID
        in: path
        name: friend_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: creates a friend request to another user
      tags:
      - friends
  /user/friends/requests/{friend_id}/accept:
    post:
      consumes:
      - application/json
      parameters:
      - description: Friend ID
        in: path
        name: friend_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: accepts an incoming friend request
      tags:
      - friends
  /user/friends/requests/incoming:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/service.Friend'
            type: array
      summary: returns user's incoming friends requests
      tags:
      - friends
  /user/wishlists:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/service.Wishlist'
            type: array
      summary: returns user's wishlists
      tags:
      - user
    post:
      consumes:
      - application/json
      parameters:
      - description: request body
        in: body
        name: wishlist
        required: true
        schema:
          $ref: '#/definitions/service.CreateWishlistRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.Wishlist'
      summary: creates wishlist
      tags:
      - user
  /user/wishlists/{wishlist_id}/items:
    get:
      consumes:
      - application/json
      parameters:
      - description: Wishlist ID
        in: path
        name: wishlist_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/service.WishlistItem'
            type: array
      summary: returns wishlist items
      tags:
      - wishlist
    post:
      consumes:
      - application/json
      parameters:
      - description: Wishlist ID
        in: path
        name: wishlist_id
        required: true
        type: integer
      - description: request body
        in: body
        name: item
        required: true
        schema:
          $ref: '#/definitions/service.CreateWishlistItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.WishlistItem'
      summary: creates a wishlist item
      tags:
      - wishlist
securityDefinitions:
  ApiKeyAuth:
    description: Description for what is this security definition being used
    in: header
    name: Authorization
    type: apiKey
  BasicAuth:
    type: basic
  OAuth2AccessCode:
    authorizationUrl: https://example.com/oauth/authorize
    flow: accessCode
    scopes:
      admin: Grants read and write access to administrative information
    tokenUrl: https://example.com/oauth/token
    type: oauth2
  OAuth2Application:
    flow: application
    scopes:
      admin: Grants read and write access to administrative information
      write: Grants write access
    tokenUrl: https://example.com/oauth/token
    type: oauth2
  OAuth2Implicit:
    authorizationUrl: https://example.com/oauth/authorize
    flow: implicit
    scopes:
      admin: Grants read and write access to administrative information
      write: Grants write access
    type: oauth2
  OAuth2Password:
    flow: password
    scopes:
      admin: Grants read and write access to administrative information
      read: Grants read access
      write: Grants write access
    tokenUrl: https://example.com/oauth/token
    type: oauth2
swagger: "2.0"
