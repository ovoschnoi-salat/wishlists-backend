services:
  loki:
    image: grafana/loki:latest
    container_name: wishlists-loki
    restart: unless-stopped
    volumes:
      - ./configs/loki-config.yml:/etc/loki/local-config.yaml
      - loki_storage:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend_network


  alloy:
    image: grafana/alloy:latest
    container_name: wishlists-alloy
    restart: unless-stopped
    environment:
      ALLOY_DEPLOY_MODE: docker
    volumes:
      - ./configs/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro # Needed for Docker container discovery
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - loki
    networks:
      - backend_network


  prometheus:
    image: prom/prometheus:latest
    container_name: wishlists-prometheus
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_storage:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - backend_network


  grafana:
    image: grafana/grafana:latest
    container_name: wishlists-grafana
    restart: unless-stopped
    environment:
      GF_SERVER_DOMAIN: "${DOMAIN:-localhost}"
      GF_SERVER_ROOT_URL: "https://${DOMAIN:-localhost}:${PORT}/grafana"
      GR_SERVER_SERVE_FROM_SUB_PATH: true
    volumes:
      - ./configs/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - grafana_storage:/var/lib/grafana
    networks:
      - backend_network


  db:
    container_name: wishlists-db
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: "wishlists"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASS}"
    volumes:
      - "${POSTGRES_DATA_FOLDER}:/var/lib/postgresql"
    networks:
      - backend_network


  backend:
    container_name: wishlists-backend
    restart: unless-stopped
    build:
      dockerfile: ./Dockerfile
    environment:
      PG_DSN: "postgresql://${POSTGRES_USER}:${POSTGRES_PASS}@wishlists-db:5432/wishlists"
      LISTEN_ADDR: ":8000"
      STAGE: "${STAGE}"
      BOT_TOKEN: "${BOT_TOKEN}"
    depends_on:
      db:
        condition: service_started
    networks:
      - backend_network


  nginx:
    container_name: wishlists-nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
#      - "80:80"
#      - "443:443"
    environment:
      PORT: "${PORT}"
      DOMAIN: "${DOMAIN:-_}"
      TLS_CERT_FILE: "/cert.pem"
      TLS_KEY_FILE: "/key.pem"
      BACKEND_PREFIX: "api"
      BACKEND_HOST: "backend"
      BACKEND_PORT: "8000"
#      S3_PREFIX: ""
#      S3_HOST: ""
#      S3_PORT: ""
      GRAFANA_PREFIX: grafana
      GRAFANA_HOST: grafana
      GRAFANA_PORT: 3000
    volumes:
      - "${TLS_CERT_FILE}:/cert.pem:ro"
      - "${TLS_KEY_FILE}:/key.pem:ro"
#      - ./html:/usr/share/nginx/html:ro
      - ./configs/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks:
      - backend_network


volumes:
  grafana_storage:
  loki_storage:
  prometheus_storage:

networks:
  backend_network:
