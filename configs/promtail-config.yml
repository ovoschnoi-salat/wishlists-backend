server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/log/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    docker_sd_configs:
      - host: "unix:///var/run/docker.sock"
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
            tag: attrs.tag
            # docker compose
            compose_project: attrs."com.docker.compose.project"
            compose_service: attrs."com.docker.compose.service"
            # backend
            level: log.level
            path: log.pattern
            method: log.method
            status: log.status
      - regex:
          expression: "^/var/lib/docker/containers/(?P<container_id>.{12}).+/.+-json.log$"
          source: filename
      - timestamp:
          format: RFC3339Nano
          source: time
      - labels:
          stream:
          container_id:
          tag:
          # docker compose
          compose_project:
          compose_service:
          level:
          path:
          method:
          status:
      - output:
          source: log
    relabel_configs:
      - source_labels: [ "compose_service" ]
        regex: "wishlists-backend"
        action: "keep"
